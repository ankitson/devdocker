version: "3.8"
services:
  devbox:
    image: ankit/devbox:0.2
    container_name: devbox2
    hostname: devbox2
    ports:
      - "2201:22"
      - "9223:9222"  # Playwright headless browser (container → host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - devbox_home:/home/dev
    restart: always

volumes:
  devbox_home:
    external: true
